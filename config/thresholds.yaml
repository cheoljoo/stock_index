recipients:
  default:   ["cheoljoo@gmail.com"]
  risk_team: ["cheoljoo@gmail.com"]   # 위험 수위 전용 그룹 (추후 별도 담당자 추가 가능)

# ── 임계치 조건 연산자 ────────────────────────────────────────────────
# op: ">=" | "<="      : 최신값이 value 이상/이하
# op: "pct_change"     : window일 대비 등락률(%) — 양수=상승, 음수=하락
#   급등/급락  : window=1 (단기 충격)
#   강세장/약세장 : window=60 (중기 추세, 주가·ETF·코인·원자재)
#   환율 강세/약세 : window=60, 기준 ±10%
#   금리 급등/급락 : window=30, pct_change 기준 (절대값 변동이 작아 % 사용)
# notify 없으면 메일 미발송 (DB 기록만 됨)
# ──────────────────────────────────────────────────────────────────────

thresholds:

  # ── 주가지수 ─────────────────────────────────────────────────────────

  kospi200:
    - level: "급등"
      condition: { op: "pct_change", value: 3.0,   window: 1 }
      notify: default
    - level: "급락"
      condition: { op: "pct_change", value: -3.0,  window: 1 }
      notify: default
    - level: "강세장"
      condition: { op: "pct_change", value: 20.0,  window: 60 }
      notify: [default, risk_team]
    - level: "약세장"
      condition: { op: "pct_change", value: -20.0, window: 60 }
      notify: [default, risk_team]

